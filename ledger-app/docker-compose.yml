version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ledger-postgres
    environment:
      POSTGRES_DB: ledger
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ledger -d ledger']
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: ledger-backend
    restart: on-failure
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://ledger:ledger@postgres:5432/ledger
      HOST: 0.0.0.0
      PORT: 8080
      FRONTEND_ORIGIN: http://localhost:5173
      LEDGER_IMPORT_DIR: /app/data/imports
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:8080/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    ports:
      - '8080:8080'
    volumes:
      - ./backend:/app
      - ./data/imports:/app/data/imports

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ledger-frontend
    restart: on-failure
    environment:
      API_TARGET: http://backend:8080
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
