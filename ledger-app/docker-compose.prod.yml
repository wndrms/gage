version: '3.9'

# 프로덕션 오버라이드: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  postgres:
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ledger}
      POSTGRES_USER: ${POSTGRES_USER:-ledger}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD 환경변수가 필요합니다}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports: []

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ledger}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ledger}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD 환경변수가 필요합니다}
      COOKIE_SECURE: "true"
      RUST_LOG: "info"
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:8080/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - import_data:/app/data/imports
    ports:
      - '127.0.0.1:8080:8080'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  import_data:
